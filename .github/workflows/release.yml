name: Build and Release

on:
  push:
    tags:
      - 'v*' # Срабатывает при создании тега, например v1.0.0

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: hoppy-linux-x64
            bin_name: hoppy
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: hoppy-linux-arm64
            bin_name: hoppy
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: hoppy-windows-x64.exe
            bin_name: hoppy.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: hoppy-macos-intel
            bin_name: hoppy
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: hoppy-macos-arm64
            bin_name: hoppy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build project
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/${{ matrix.bin_name }} target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: ren target\${{ matrix.target }}\release\${{ matrix.bin_name }} ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Необходимо для создания релиза
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
